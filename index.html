<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loom | Modern Everyday Apparel</title>
    <meta name="description" content="Discover Loom's flagship hoodie. Premium cotton, timeless design, everyday comfort.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Inter:wght@400;500&family=Manrope:wght@400;700&family=Galada&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #ffffff;
            --accent-color: #ffffff;
            --muted-color: rgba(255, 255, 255, 0.7);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --font-main: 'Inter', sans-serif;
            --font-heading: 'Galada', cursive;

            /* Dynamic Background Variables */
            --bg-inner: #4a4a4a;
            --bg-mid: #1f1f1f;
            --bg-outer: #050505;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at center, var(--bg-inner) 0%, var(--bg-mid) 50%, var(--bg-outer) 100%);
            color: var(--text-color);
            font-family: var(--font-main);
            overflow: hidden; /* Remove scroll */
            height: 100vh;
            transition: background 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.cloud-theme {
            --bg-inner: #7a8ca0;
            --bg-mid: #37424d;
            --bg-outer: #0a0d10;
        }

        #bubbles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bubble-img {
            position: absolute;
            pointer-events: none;
        }

        @keyframes floatUpImg {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 0.4; }
            90% { opacity: 0.4; }
            100% {
                transform: translateY(-110vh) translateX(30px) rotate(360deg);
                opacity: 0;
            }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 4%;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 700;
            font-size: 1.2rem;
            font-family: var(--font-heading);
        }

        .nav {
            display: flex;
            gap: 0.5rem;
            background: var(--glass-bg);
            padding: 0.4rem;
            border-radius: 100px;
            border: 1px solid var(--glass-border);
        }

        .nav.glass {
            position: relative;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1), inset 0 0 0 1px rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .nav-item {
            font-family: 'Manrope', sans-serif;
            color: var(--muted-color);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            padding: 0.5rem 1.2rem;
            border-radius: 100px;
            transition: all 0.3s ease;
        }

        .nav-item:hover,
        .nav-item.active {
            background: #fbcfe8;
            color: #011d17;
        }

        .contact-btn {
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            padding: 0.9rem 2rem;
            border-radius: 100px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: none;
        }

        .contact-btn:hover {
            background: rgba(0, 0, 0, 0.7);
            transform: translateY(-2px);
            box-shadow: none;
        }

        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4%;
            padding-top: 5rem;
        }

        .hero-content {
            display: flex;
            justify-content: space-between;
            align-items: stretch; /* Stretch columns to full height */
            width: 100%;
            max-width: 100%;
            padding: 0;
            height: 100%;
            position: relative;
        }

        /* Typography */
        .main-title,
        .side-title {
            font-family: var(--font-heading);
            font-size: clamp(5rem, 10vw, 12rem);
            line-height: 0.8;
            font-weight: 400;
            text-transform: none;
            white-space: nowrap;
            color: white;
            letter-spacing: normal;
        }

        .outline {
            color: transparent;
            -webkit-text-stroke: 2px rgba(255, 255, 255, 0.6);
        }

        .tags-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1; /* Even further behind */
            transition: transform 0.1s ease-out;
        }

        .tag {
            position: absolute;
            width: 60px;
            height: 60px;
            pointer-events: none;
            z-index: -1;
            filter: drop-shadow(0 5px 15px rgba(0, 0, 0, 0.2));
        }

        .t1 { top: 10%; left: 15%; }
        .t2 { top: 40%; left: 80%; width: 140px; height: 140px; opacity: 0.4; }
        .t3 { top: 70%; left: 75%; width: 80px; height: 80px; }
        .t4 { top: 85%; left: 20%; width: 120px; height: 120px; opacity: 0.3; }

        .hero-left {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 6rem 0;
            gap: 2rem;
            z-index: 100;
        }

        .description {
            color: var(--muted-color);
            font-size: 1.1rem;
            line-height: 1.6;
            max-width: 400px;
        }

        .primary-btn {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            padding: 0.4rem 0.4rem 0.4rem 1.5rem;
            border-radius: 100px;
            font-weight: 700;
            cursor: pointer;
            width: fit-content;
            transition: all 0.3s ease;
            box-shadow: none;
        }

        .primary-btn:hover {
            background: rgba(0, 0, 0, 0.7);
            transform: translateY(-3px);
            box-shadow: none;
        }

        .plus-icon {
            background: #fbcfe8;
            color: #011d17;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 1.4rem;
            font-weight: 900;
            line-height: 1;
            padding-bottom: 2px; /* Compensate for baseline shift */
            border: none;
        }

        .award-badge {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: auto; /* Push to bottom */
        }

        .award-icon {
            width: 48px;
            height: 48px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .award-text { display: flex; flex-direction: column; }
        .award-title { font-size: 0.7rem; letter-spacing: 0.1em; color: var(--muted-color); }
        .award-subtitle { font-size: 0.85rem; font-weight: 600; }

        .hero-center {
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0;
            animation: fadeIn 1.5s ease-out 0.3s forwards, float 6s ease-in-out infinite;
            pointer-events: none;
            background: radial-gradient(circle at center, rgba(251, 207, 232, 0.08) 0%, transparent 70%);
        }

        @keyframes fadeIn { to { opacity: 1; } }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .main-product-3d {
            width: 80vw;
            height: 80vh;
            outline: none;
            --progress-bar-color: transparent;
            --poster-color: transparent;
            z-index: 1;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(25deg);
            pointer-events: none;
        }

        .main-product-3d[camera-controls] { pointer-events: auto; }

        .accessories-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 110; /* Above text (100) and hoodie (50) */
            transition: transform 0.1s ease-out;
        }

        .accessories-container-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0; /* Behind everything */
            transition: transform 0.1s ease-out;
        }

        .accessory {
            position: absolute;
            width: 120px;
            height: 120px;
            outline: none;
            --progress-bar-color: transparent;
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.3));
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .accessory.no-animation { animation: none !important; }

        .a1 { top: 25%; left: 30%; width: 220px; height: 220px; }
        .a2 { top: 60%; left: 42%; width: 100px; height: 100px; }
        .a3 { top: 30%; left: 62%; width: 250px; height: 250px; }
        .a4 { top: 15%; left: 48%; width: 140px; height: 140px; }
        .a5 { top: 75%; left: 20%; width: 120px; height: 120px; }
        .a6 { top: 45%; left: 75%; width: 180px; height: 180px; }
        .a7 { top: 15%; left: 40%; width: 80px; height: 80px; opacity: 0.7; }
        .a8 { top: 50%; left: 55%; width: 70px; height: 70px; opacity: 0.6; }
        .a9 { top: 80%; left: 35%; width: 75px; height: 75px; opacity: 0.7; }

        .hero-right {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: flex-end;
            text-align: right;
            height: 100%;
            padding: 6rem 0;
            z-index: 100;
            width: 450px;
            pointer-events: none;
        }

        .product-carousel {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            align-items: flex-end;
            pointer-events: auto; /* Enable interaction */
        }

        .carousel-cards { display: flex; gap: 1.5rem; }

        .card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 1rem;
            padding-top: 5rem;
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 135px;
            position: relative;
            backdrop-filter: blur(10px);
            text-align: center;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .card.active {
            border-color: #fbcfe8;
            border-width: 1px;
            background: rgba(251, 207, 232, 0.08);
            box-shadow: 0 0 15px rgba(251, 207, 232, 0.15);
        }

        .card img {
            width: 140px;
            height: auto;
            margin-top: -8rem;
            filter: drop-shadow(0 20px 35px rgba(0, 0, 0, 0.5));
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) !important;
            display: block;
            will-change: transform;
            pointer-events: none; /* Mouse passes through image to trigger card hover */
        }

        .card:hover img {
            transform: translateY(-30px) rotate(-12deg) scale(1.15) !important;
        }

        .card-info {
            display: flex;
            flex-direction: column;
            font-size: 0.75rem;
            width: 100%;
            word-wrap: break-word;
        }

        .card-info span:first-child { font-weight: 600; margin-bottom: 0.2rem; }
        .card-info span:last-child { color: var(--muted-color); }

        .carousel-nav { display: flex; gap: 1rem; }

        .nav-arrow {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }

        .nav-arrow:hover { background: rgba(255, 255, 255, 0.1); }

        .side-title { align-self: flex-end; text-align: right; }

        @keyframes shine {
            from { transform: translateX(-100%) rotate(45deg); }
            to { transform: translateX(200%) rotate(45deg); }
        }

        /* Responsive Breakpoints */
        @media (max-width: 1200px) {
            body {
                overflow-y: auto;
                height: auto;
            }
            .hero {
                height: auto;
                padding-bottom: 5rem;
            }
            .hero-content {
                display: flex;
                flex-direction: column;
                justify-content: flex-start;
                align-items: center;
                gap: 3rem;
                padding-top: 8rem;
                height: auto;
            }
            .main-product-3d {
                position: relative;
                width: 100vw;
                height: 50vh;
                top: 0;
                left: 0;
                transform: rotate(25deg);
                margin: 2rem 0;
            }
            .hero-center {
                position: relative;
                height: 50vh;
                order: 2; /* Put model in center */
            }
            .hero-left {
                order: 1;
                padding: 0;
                align-items: center;
                text-align: center;
                gap: 1.5rem;
            }
            .hero-right {
                order: 3;
                padding: 0;
                align-items: center;
                text-align: center;
                width: 100%;
            }
            .main-title, .side-title {
                font-size: 5rem;
                text-align: center;
            }
            .side-title {
                align-self: center;
            }
            .description {
                max-width: 500px;
            }
            .award-badge {
                margin-top: 1rem;
            }
            .header {
                padding: 1rem 4%;
            }
        }
    </style>
</head>
<body>

    <!-- Particle container (fiber-flecks) -->
    <div id="bubbles-container"></div>

    <!-- Header (glass nav) -->
    <header class="header">
        <div class="logo">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" />
                <path d="M12 8V16M8 12H16" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
            <span>Loom</span>
        </div>
        <nav class="nav glass">
            <a href="#" class="nav-item active">Home</a>
            <a href="#" class="nav-item">Fabric</a>
            <a href="#" class="nav-item">Fit</a>
            <a href="#" class="nav-item">Sustainability</a>
            <a href="#" class="nav-item">Reviews</a>
        </nav>
        <button class="contact-btn">Contact Us</button>
    </header>

    <!-- Hero container -->
    <main class="hero">
        <div class="hero-content">
            
            <!-- Floating hang-tags (far background) -->
            <div class="tags-container">
                <model-viewer class="tag t1" src="assets/watch.glb" environment-image="neutral" exposure="1.0" interaction-prompt="none" camera-orbit="45deg 75deg 105%"></model-viewer>
                <model-viewer class="tag t2" src="assets/watch.glb" environment-image="neutral" exposure="1.0" interaction-prompt="none" camera-orbit="-30deg 60deg 105%"></model-viewer>
                <model-viewer class="tag t3" src="assets/watch.glb" environment-image="neutral" exposure="1.0" interaction-prompt="none" camera-orbit="120deg 85deg 105%"></model-viewer>
                <model-viewer class="tag t4" src="assets/watch.glb" environment-image="neutral" exposure="1.0" interaction-prompt="none" camera-orbit="10deg 45deg 105%"></model-viewer>
            </div>

            <!-- Left column -->
            <div class="hero-left">
                <h1 class="main-title large-animation-1">
                    <span class="outline">Wear</span><br>
                    Free
                </h1>
                <p class="description">
                    Unleash the comfort of premium cotton. <br>
                    Refined silhouettes, refined fabric — <br>
                    all in one timeless design.
                </p>
                <div class="cta-group">
                    <button class="primary-btn">
                        Shop Now
                        <span class="plus-icon">+</span>
                    </button>
                </div>
                <div class="award-badge">
                    <div class="award-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 15L15 18L19 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                            <path d="M7 10L12 15L17 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </div>
                    <div class="award-text">
                        <span class="award-title">DESIGN AWARDS</span>
                        <span class="award-subtitle">PREMIUM APPAREL 2025</span>
                    </div>
                </div>
            </div>

            <!-- Background accessories (behind the t-shirt) -->
            <div class="accessories-container-bg">
                <model-viewer class="accessory a7" src="assets/sneaker.glb" environment-image="neutral" exposure="1.0" interaction-prompt="none" camera-orbit="-20deg 110deg 105%"></model-viewer>
                <model-viewer class="accessory a8" src="assets/sneaker.glb" environment-image="neutral" exposure="1.0" interaction-prompt="none" camera-orbit="160deg 45deg 105%"></model-viewer>
                <model-viewer class="accessory a9" src="assets/sneaker.glb" environment-image="neutral" exposure="1.0" interaction-prompt="none" camera-orbit="45deg 20deg 105%"></model-viewer>
            </div>

            <!-- Center product (the 3D t-shirt) -->
            <div class="hero-center">
                <model-viewer id="product-model" src="assets/shirt_baked.glb" alt="Loom Shirt 3D Model" camera-controls
                    disable-zoom shadow-intensity="0" environment-image="neutral" exposure="1.5"
                    interaction-prompt="none" camera-orbit="0deg 90deg 380%" field-of-view="30deg"
                    class="main-product-3d">
                </model-viewer>
            </div>

            <!-- Foreground accessories (above text and product) -->
            <div class="accessories-container">
                <model-viewer class="accessory a1" src="assets/sneaker.glb" environment-image="neutral" exposure="1.2" interaction-prompt="none" camera-orbit="45deg 120deg 105%"></model-viewer>
                <model-viewer class="accessory a2" src="assets/sneaker.glb" environment-image="neutral" exposure="1.2" interaction-prompt="none" camera-orbit="-120deg 45deg 105%"></model-viewer>
                <model-viewer class="accessory a3" src="assets/sneaker.glb" environment-image="neutral" exposure="1.2" interaction-prompt="none" camera-orbit="200deg 90deg 105%"></model-viewer>
                <model-viewer class="accessory a4" src="assets/sneaker.glb" environment-image="neutral" exposure="1.2" interaction-prompt="none" camera-orbit="10deg 20deg 105%"></model-viewer>
                <model-viewer class="accessory a5" src="assets/sneaker.glb" environment-image="neutral" exposure="1.2" interaction-prompt="none" camera-orbit="-45deg 160deg 105%"></model-viewer>
                <model-viewer class="accessory a6" src="assets/sneaker.glb" environment-image="neutral" exposure="1.2" interaction-prompt="none" camera-orbit="80deg 75deg 105%"></model-viewer>
            </div>

            <!-- Right column (colorway carousel + side title) -->
            <div class="hero-right">
                <div class="product-carousel">
                    <div class="carousel-cards">
                        <div class="card active" data-flavor="midnight">
                            <img src="assets/midnight_hoodie.png" alt="Loom Midnight T-Shirt">
                            <div class="card-info">
                                <span>Midnight</span>
                                <span>$54.99</span>
                            </div>
                        </div>
                        <div class="card" data-flavor="cloud">
                            <img src="assets/cloud_hoodie.png" alt="Loom Cloud T-Shirt" style="filter: brightness(0.85);">
                            <div class="card-info">
                                <span>Cloud</span>
                                <span>$54.99</span>
                            </div>
                        </div>
                    </div>
                    <div class="carousel-nav">
                        <button class="nav-arrow" id="btn-prev">←</button>
                        <button class="nav-arrow" id="btn-next">→</button>
                    </div>
                </div>
                <h2 class="side-title large-animation-1">
                    <span class="outline">Effortless</span><br>
                    Comfort
                </h2>
            </div>

        </div>
    </main>

    <!-- Hidden frosted-glass SVG filter + model preload -->
    <svg style="position: absolute; width: 0; height: 0; opacity: 0; pointer-events: none;">
        <filter id="frosted">
            <feTurbulence type="fractalNoise" baseFrequency="0.0125" numOctaves="3" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="80" xChannelSelector="R" yChannelSelector="G" />
        </filter>
    </svg>
    <div style="display: none;">
        <!-- Preload accessory models to avoid lag during switch -->
        <model-viewer src="assets/sunglasses.glb"></model-viewer>
        <model-viewer src="assets/sneaker.glb"></model-viewer>
    </div>

    <!-- Interaction Script -->
    <script>
        const modelViewer = document.querySelector('#product-model');
        const accessoriesFG = document.querySelector('.accessories-container');
        const accessoriesBG = document.querySelector('.accessories-container-bg');
        const tagsBG = document.querySelector('.tags-container');
        const allAccessories = document.querySelectorAll('.accessory');
        const cards = document.querySelectorAll('.card');
        const prevBtn = document.querySelector('#btn-prev');
        const nextBtn = document.querySelector('#btn-next');
        let isSwitching = false;
        let switchSpin = 0;
        let cloudTexture = null;
        let midnightTexture = null;

        // Preload textures & Warm up shaders
        modelViewer.addEventListener('load', async () => {
            try {
                cloudTexture = await modelViewer.createTexture('assets/cloud_base_color.jpg');
                midnightTexture = await modelViewer.createTexture('assets/midnight_base_color.jpg');

                // Shader Warm-up: Briefly apply textures to compile shaders
                if (modelViewer.model) {
                    const material = modelViewer.model.materials[0];
                    if (material && material.pbrMetallicRoughness.baseColorTexture) {
                        // Apply cloud
                        material.pbrMetallicRoughness.baseColorTexture.setTexture(cloudTexture);
                        await new Promise(r => requestAnimationFrame(r));
                        // Apply midnight back
                        material.pbrMetallicRoughness.baseColorTexture.setTexture(midnightTexture);
                    }
                }
            } catch (e) { console.error("Texture preload failed", e); }
        });

        cards.forEach(card => {
            card.addEventListener('click', () => {
                if (isSwitching) return;
                if (card.classList.contains('active')) return;
                cards.forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                const flavor = card.dataset.flavor;
                switchColorway(flavor);
            });
        });

        // Carousel arrow button navigation
        function toggleCarousel() {
            if (isSwitching) return;
            const activeCard = document.querySelector('.card.active');
            const targetCard = Array.from(cards).find(c => c !== activeCard);
            if (targetCard) {
                cards.forEach(c => c.classList.remove('active'));
                targetCard.classList.add('active');
                switchColorway(targetCard.dataset.flavor);
            }
        }
        if (prevBtn) prevBtn.addEventListener('click', toggleCarousel);
        if (nextBtn) nextBtn.addEventListener('click', toggleCarousel);

        async function switchColorway(flavor) {
            if (isSwitching) return;
            isSwitching = true;
            const body = document.body;
            const accessories = document.querySelectorAll('.accessory');
            const heroCenter = document.querySelector('.hero-center');

            // 1. Background Animation
            const targetColors = flavor === 'cloud' ?
                { inner: '#7a8ca0', mid: '#37424d', outer: '#0a0d10' } :
                { inner: '#4a4a4a', mid: '#1f1f1f', outer: '#050505' };

            gsap.to(body, {
                '--bg-inner': targetColors.inner,
                '--bg-mid': targetColors.mid,
                '--bg-outer': targetColors.outer,
                duration: 1.5,
                ease: 'power2.inOut'
            });

            // 2. Hoodie Spin Animation (Simple 360 spin + blur with back settle)
            const spinObj = { val: 0, blur: 0 };
            gsap.to(spinObj, {
                val: 360,
                blur: 15,
                duration: 0.6,
                ease: "power2.in",
                onUpdate: () => {
                    switchSpin = spinObj.val;
                    modelViewer.style.filter = `blur(${spinObj.blur}px)`;
                },
                onComplete: async () => {
                    // SWAP at peak
                    if (flavor === 'cloud') {
                        body.classList.add('cloud-theme');
                        if (modelViewer.model && cloudTexture) {
                            modelViewer.model.materials.forEach(material => {
                                if (material.pbrMetallicRoughness.baseColorTexture) {
                                    material.pbrMetallicRoughness.baseColorTexture.setTexture(cloudTexture);
                                }
                            });
                        }
                    } else {
                        body.classList.remove('cloud-theme');
                        if (modelViewer.model && midnightTexture) {
                            modelViewer.model.materials.forEach(material => {
                                if (material.pbrMetallicRoughness.baseColorTexture) {
                                    material.pbrMetallicRoughness.baseColorTexture.setTexture(midnightTexture);
                                }
                            });
                        }
                    }

                    gsap.to(spinObj, {
                        val: 720,
                        blur: 0,
                        duration: 1.5,
                        ease: "back.out(0.7)",
                        onUpdate: () => {
                            switchSpin = spinObj.val;
                            modelViewer.style.filter = `blur(${spinObj.blur}px)`;
                        },
                        onComplete: () => {
                            switchSpin = 0;
                            modelViewer.style.filter = 'none';
                        }
                    });
                }
            });

            // 3. Accessories "Hide & Reveal" with Dynamic Positioning
            let completedAccessories = 0;
            accessories.forEach((accessory, i) => {
                const aW = accessory.offsetWidth / 2;
                const aH = accessory.offsetHeight / 2;
                const centerX = (window.innerWidth / 2 - accessory.offsetLeft - aW);
                const centerY = (window.innerHeight / 2 - accessory.offsetTop - aH);

                const startAngle = parseFloat(accessory.dataset.angle) || 0;
                const currentBaseX = parseFloat(accessory.dataset.baseX) || 0;
                const currentBaseY = parseFloat(accessory.dataset.baseY) || 0;

                // New random target position - Increased range for visibility
                const nextBaseX = (Math.random() - 0.5) * 200;
                const nextBaseY = (Math.random() - 0.5) * 200;

                gsap.set(accessory, {
                    rotation: startAngle,
                    x: currentBaseX,
                    y: currentBaseY
                });

                const accessoryTl = gsap.timeline();

                accessoryTl.to(accessory, {
                    x: centerX,
                    y: centerY,
                    rotation: startAngle + 45,
                    scale: 0.1,
                    opacity: 0,
                    duration: 0.5,
                    ease: "power2.in",
                    onComplete: () => {
                        accessory.src = flavor === 'cloud' ? 'assets/sunglasses.glb' : 'assets/sneaker.glb';
                        heroCenter.style.zIndex = 50;
                    }
                })
                .to(accessory, {
                    duration: 0.3
                })
                .to(accessory, {
                    onStart: () => {
                        heroCenter.style.zIndex = 1;
                    },
                    x: nextBaseX,
                    y: nextBaseY,
                    rotation: startAngle + 90,
                    scale: 1,
                    opacity: 1,
                    duration: 0.9,
                    ease: "back.out(1.5)",
                    onComplete: () => {
                        accessory.dataset.angle = startAngle + 90;
                        accessory.dataset.baseX = nextBaseX;
                        accessory.dataset.baseY = nextBaseY;
                        accessory.dataset.rx = 0;
                        accessory.dataset.ry = 0;

                        completedAccessories++;
                        if (completedAccessories === accessories.length) {
                            isSwitching = false;
                        }
                    }
                });
            });
        }

        // Track accessory states for smoothing
        allAccessories.forEach(a => {
            a.dataset.rx = 0; a.dataset.ry = 0; a.dataset.angle = Math.random() * 360;
            a.dataset.baseX = 0; a.dataset.baseY = 0;
            a.dataset.targetRx = 0; a.dataset.targetRy = 0;
        });

        let mouse = { x: 0, y: 0, px: 0, py: 0 };
        let currentMouse = { x: 0, y: 0 };

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) - 0.5;
            mouse.y = (e.clientY / window.innerHeight) - 0.5;
            mouse.px = e.clientX;
            mouse.py = e.clientY;
        });

        function animate() {
            const time = Date.now() * 0.001;
            // Target camera position based on mouse
            // Smoothly interpolate current mouse to target mouse
            currentMouse.x += (mouse.x - currentMouse.x) * 0.05;
            currentMouse.y += (mouse.y - currentMouse.y) * 0.05;

            // Tilt the product hoodie + add switch spin
            modelViewer.cameraOrbit = `${(currentMouse.x * 40) + switchSpin}deg ${90 + (currentMouse.y * 20)}deg 380%`;

            // Update parallax containers - Always
            accessoriesFG.style.transform = `translate(${currentMouse.x * 60}px, ${currentMouse.y * 60}px)`;
            accessoriesBG.style.transform = `translate(${currentMouse.x * -30}px, ${currentMouse.y * -30}px)`;
            tagsBG.style.transform = `translate(${currentMouse.x * -15}px, ${currentMouse.y * -15}px)`;

            // Update each accessory with its own smoothing and float - ONLY IF NOT SWITCHING
            if (!isSwitching) {
                allAccessories.forEach((accessory, i) => {
                    const accRect = accessory.getBoundingClientRect();
                    const accX = accRect.left + accRect.width / 2;
                    const accY = accRect.top + accRect.height / 2;

                    const diffX = mouse.px - accX;
                    const diffY = mouse.py - accY;
                    const distance = Math.sqrt(diffX * diffX + diffY * diffY);

                    let targetRx = 0, targetRy = 0, speedMult = 1;

                    if (distance < 400) {
                        const force = (400 - distance) / 400;
                        targetRx = (diffX / distance) * force * -80;
                        targetRy = (diffY / distance) * force * -80;
                        speedMult = 1 + force * 5;
                    }

                    // Lerp repulsion values
                    let rx = parseFloat(accessory.dataset.rx) || 0;
                    let ry = parseFloat(accessory.dataset.ry) || 0;
                    let angle = parseFloat(accessory.dataset.angle) || 0;
                    let baseX = parseFloat(accessory.dataset.baseX) || 0;
                    let baseY = parseFloat(accessory.dataset.baseY) || 0;

                    rx += (targetRx - rx) * 0.1;
                    ry += (targetRy - ry) * 0.1;
                    angle += 0.2 * speedMult;

                    accessory.dataset.rx = rx;
                    accessory.dataset.ry = ry;
                    accessory.dataset.angle = angle;

                    // Floating effect
                    const dur = [5, 7, 6, 8, 5.5, 6.5, 9, 11, 10][i % 9];
                    const phase = (time + i * 0.7) * (Math.PI * 2 / dur);
                    const floatY = Math.sin(phase) * 15;
                    const floatAngle = Math.cos(phase) * 6;

                    accessory.style.transform = `translate(calc(${rx + baseX}px), calc(${ry + baseY}px + ${floatY}px)) rotate(calc(${angle}deg + ${floatAngle}deg))`;
                });
            }

            // Update tags with float - ALWAYS
            document.querySelectorAll('.tag').forEach((tag, i) => {
                const dur = 10 + i * 2;
                const phase = (time + i * 1.2) * (Math.PI * 2 / dur);
                const floatY = Math.sin(phase) * 20;
                const floatX = Math.cos(phase * 0.5) * 15;
                const floatAngle = Math.sin(phase * 0.3) * 15;
                tag.style.transform = `translate(${floatX}px, ${floatY}px) rotate(${floatAngle}deg)`;
            });

            requestAnimationFrame(animate);
        }

        animate();

        // Particle Generator using particle.png
        const bubblesContainer = document.getElementById('bubbles-container');
        function createParticle() {
            if (!bubblesContainer) return;
            const particle = document.createElement('img');
            particle.src = 'assets/particle.png';
            particle.className = 'bubble-img';
            const size = Math.random() * 20 + 10 + 'px';
            particle.style.width = size;
            particle.style.height = 'auto';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.bottom = '-50px';
            particle.style.opacity = Math.random() * 0.4 + 0.2;

            const duration = Math.random() * 6 + 4;
            particle.style.animation = `floatUpImg ${duration}s linear forwards`;

            bubblesContainer.appendChild(particle);
            setTimeout(() => particle.remove(), duration * 1000);
        }
        setInterval(createParticle, 400);
    </script>
</body>
